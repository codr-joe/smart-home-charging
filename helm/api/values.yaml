replicaCount: 1

image:
  repository: harbor.hooyberghs.eu/smart-charging/api
  tag: latest
  pullPolicy: Always

service:
  port: 8080

p1MeterUrl: "http://192.168.30.6"

# Reference to an existing Secret that must contain the key 'database-url'.
# Create this secret manually before deploying:
#   kubectl create secret generic api-secret \
#     --namespace smart-charging \
#     --from-literal=database-url='postgres://...'
existingSecret: api-secret

# Reference to an existing Secret that must contain 'pushover-api-token' and
# 'pushover-user-key'. When set, the API sends Pushover notifications when excess
# solar power crosses significant thresholds. Leave empty to disable notifications.
#   kubectl create secret generic pushover-secret \
#     --namespace smart-charging \
#     --from-literal=pushover-api-token='YOUR_TOKEN' \
#     --from-literal=pushover-user-key='YOUR_USER_KEY'
pushoverSecret: pushover-secret

ingress:
  enabled: true
  hostname: smart-charging.hooyberghs.eu
  # Name of the Gateway resource created by the web chart (same namespace).
  gatewayName: web

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20
