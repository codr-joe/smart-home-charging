replicaCount: 1

image:
  repository: harbor.hooyberghs.eu/smart-charging/web
  tag: latest
  pullPolicy: Always

service:
  port: 3000

ingress:
  enabled: true
  hostname: smart-charging.hooyberghs.eu
  gatewayClassName: traefik
  tls:
    secretName: web-tls

# Internal cluster URL of the API service.
apiBaseUrl: "http://api.smart-home-charging.svc.cluster.local:8080"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
