apiVersion: v1
kind: Service
metadata:
  name: {{ include "db.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "db.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "db.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
