apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-charging-db
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: development
  source:
    repoURL: https://github.com/codr-joe/smart-home-charging.git
    targetRevision: HEAD
    path: infra/helm/db
    helm:
      releaseName: db
  destination:
    server: https://kubernetes.default.svc
    namespace: smart-home-charging
  syncPolicy:
    retry:
      limit: 2
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
