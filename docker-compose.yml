services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: smartcharging
      POSTGRES_PASSWORD: smartcharging
      POSTGRES_DB: smartcharging
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcharging -d smartcharging"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
